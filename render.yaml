
databases:
  - name: financeflow-db
    databaseName: financeflow
    user: financeflow
    plan: free
    region: frankfurt

services:
  - type: web
    name: financeflow-api
    runtime: node
    region: frankfurt
    plan: free
    branch: main
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: bash scripts/render-start.sh
    healthCheckPath: /api/health/live
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: financeflow-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ATTACHMENT_URL_SECRET
        sync: false
      - key: ADMIN_OPERATIONS_SECRET
        sync: false
      - key: DISABLE_JOB_POLLER
        value: "true"
      - key: THROTTLE_LIMIT
        value: "120"

  - type: web
    name: financeflow-web
    runtime: static
    region: frankfurt
    plan: free
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_ENV
        value: production
